<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do App - Organize Your Day Effortlessly</title>
    <meta
      name="description"
      content="A simple and efficient To-Do app to manage your daily tasks and boost productivity. Add, update, and track your tasks easily."
    />
    <meta name="author" content="Dev Kant Kumar" />
    <meta name="robots" content="index, follow" />

    <!-- Search engine verification -->
    <meta name="yandex-verification" content="1ed51c7690ae3bfe" />
    <meta name="monetag" content="f824c183dd4f46592673cb88f492194b" />

    <!-- Favicons & app icons -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="todo." />

    <!-- Open Graph for Social Sharing -->
    <meta
      property="og:title"
      content="To Do App - Organize Your Day Effortlessly"
    />
    <meta
      property="og:description"
      content="Stay on top of your tasks with our intuitive and minimalist to-do list app."
    />
    <meta
      property="og:image"
      content="https://todo.devkantkumar.com/og-img-vo.png"
    />
    <meta property="og:url" content="https://todo.devkantkumar.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="todo." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="To Do App - Organize Your Day Effortlessly"
    />
    <meta
      name="twitter:description"
      content="Boost productivity with a sleek to-do app designed for ease and speed."
    />
    <meta
      name="twitter:image"
      content="https://todo.devkantkumar.com/og-img-vo.png"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://todo.devkantkumar.com/" />

    <!-- Manifest & Theme (for PWA or better mobile support) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#05050a" />

    <!-- Structured data (JSON-LD) — helps search engines understand the app -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://todo.devkantkumar.com/#organization",
            "name": "todo.",
            "url": "https://todo.devkantkumar.com/",
            "logo": "https://todo.devkantkumar.com/list.png",
            "founder": { "@type": "Person", "name": "Dev Kant Kumar" }
          },
          {
            "@type": "WebSite",
            "@id": "https://todo.devkantkumar.com/#website",
            "name": "todo.",
            "url": "https://todo.devkantkumar.com/",
            "publisher": { "@id": "https://todo.devkantkumar.com/#organization" }
          },
          {
            "@type": "SoftwareApplication",
            "name": "todo. — Task Manager",
            "url": "https://todo.devkantkumar.com/",
            "applicationCategory": "ProductivityApplication",
            "operatingSystem": "Web, Android, iOS (PWA)",
            "description": "A free, gamified task manager with streaks, XP, recurring tasks, subtasks, tags, reminders, and offline support.",
            "publisher": { "@id": "https://todo.devkantkumar.com/#organization" },
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
          }
        ]
      }
    </script>

  </head>
  <body>
    <div id="root" class="no-select"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
